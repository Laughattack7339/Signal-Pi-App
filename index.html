<!DOCTYPE html>
<html>
    <head>
        <title>Pi Controller</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="manifest" href="manifest.json">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">



        <style>
            body {
                background-color: #2c2f33;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                font-family: 'Poppins', sans-serif;
                color: white;
            }

            button {
                padding: 20px;
                font-size: 30px;
                background-color: #254f1e;
                color: white;
                border-radius: 10px;
                margin: 20px auto;
                width: 200px;
            }

            #home, #sounds, #robot, #intro {
                display: flex;
                flex-direction: column;
                align-items: center;
            }


            h1 {
                text-align: center;
                margin-bottom: 100px;
            }

            .back-btn {
                position: absolute;
                top: 20px;
                left: 20px;
            }

            .dpad-grid {
                display: grid;
                grid-template-columns:repeat(3, 80px);
                grid-template-rows: repeat(3, 80px);
                gap: 150px;
            }

            .dpad {
                height: 100px;
            }

        </style>
    </head>
    <body>

        <div id="home">
            <h1>
                Choose a Mode
            </h1>
            
            <button onclick="showPage('sounds')">Sounds Spot</button>
            <button onclick="showPage('robot')">Robot Mode</button>
            <button onclick="showPage('intro')">Room Watch</button>


            
        </div>

        <div id="sounds" style="display: none;">
            <h1>
                Play Sounds
            </h1>

            <button  onclick="playDoorbell()">Play Doorbell Noise </button>
            <button  onclick="playDoorbell()">KALEB HELLO</button>
            <button  onclick="playDoorbell()">KALEB PENIS</button>
            <button  onclick="playDoorbell()">KALEB BRAINROT</button>

            <button class="back-btn" onclick="showPage('home')">Back</button>


        </div>

        <div id="robot" style="display: none;">
            <h1>
                Robot Mode
            
            </h1>

            <div class="dpad-grid">
                <div></div>
                <button class="dpad" onclick="forward()">FORWARD</button>
                <div></div>
                <button class="dpad" onclick="left()">LEFT</button>
                <button class="dpad" onclick="stopit()">STOP</button>
                <button class="dpad" onclick="right()">RIGHT</button>
                <div></div>
                <button class="dpad" onclick="backward()">BACK</button>
                <div></div>
            </div>
            
            <button class="back-btn" onclick="showPage('home')">Back</button>
        </div>

        <div id="intro" style="display: none;">
            <h1>
                Room Watcher
            </h1>

            <button class="back-btn" onclick="showPage('home')">Back</button>
        </div>
        
        

        <script>
            function playDoorbell() {
                fetch("http://100.66.47.82:5000/play_doorbell?token=l725M284L")
            }

            function kaleb_hello() {
                fetch("http://100.66.47.82:5000/kaleb_hello?token=l725M284L")
            }

            function kaleb_penis() {
                fetch("http://100.66.47.82:5000/kaleb_penis?token=l725M284L")
            }

            function kaleb_brainrot() {
                fetch("http://100.66.47.82:5000/kaleb_brainrot?token=l725M284L")
            }
            

            function forward() {
                fetch("http://100.66.47.82:5000/forward?token=l725M284L")
            }
            
            function backward() {
                fetch("http://100.66.47.82:5000/backward?token=l725M284L")
            }

            function left() {
                fetch("http://100.66.47.82:5000/left?token=l725M284L")
            }

            function right() {
                fetch("http://100.66.47.82:5000/right?token=l725M284L")
            }

            function stopit() {
                fetch("http://100.66.47.82:5000/stop?token=l725M284L")
            }

            function showPage(page) {
                console.log(page)
                
                document.getElementById("sounds").style.display = "none"
                document.getElementById("robot").style.display = "none"
                document.getElementById("intro").style.display = "none"
                document.getElementById("home").style.display = "none" 

                if (page == "sounds") {
                    document.getElementById("sounds").style.display = "block"
                } else if (page == "robot") {
                    document.getElementById("robot").style.display = "block"
                } else if (page == "intro") {
                    document.getElementById("intro").style.display = "block"
                } else if (page == "home") {
                    document.getElementById("home").style.display = "block"
                }
            }
        </script>
    </body>
</html>
